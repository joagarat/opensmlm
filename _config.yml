# Welcome to Jekyll!
#
# This file is NOT reloaded automatically with `jekyll serve` — if you change it,
# restart the server (Ctrl+C, then `bundle exec jekyll serve` again).

minimal_mistakes_skin    : "contrast" # try "dark" or "aqua" for a different look

# Site Settings
locale                   : "en-US"
direction                : "ltr"
title                    : "Converting a conventional fluorescence microscope into a high-performance platform for sub-10-nm single-molecule localization microscopy"
title_separator          : "-"
subtitle                 : "An open-source, step-by-step guide to build and replicate the system"
name                     : "Open-Source SMLM Platform"   # used for the footer copyright, NOT a personal name
description              : "We converted a conventional fluorescence microscope into an open-source super-resolution platform, capable of sub-10-nm molecular localization. Here you'll find a step-by-step guide to build it, verify each module, and replicate the system in your own lab, at low cost."

# --- IMPORTANT: pick ONE of the two options below depending on your repo type ---
#
# Option A) Repo named "your-username.github.io" (USER site, served at root):
# url                     : "https://your-username.github.io"
# baseurl                 :
#
# Option B) Repo with any other name, e.g. "smlm-platform" (PROJECT site):
# url                     : "https://your-username.github.io"
# baseurl                 : "/smlm-platform"
url                       :
baseurl                   :

repository               : "joagarat/opensmlm"   # e.g. "jgarat/smlm-platform" -> enables "Edit on GitHub" links
teaser                    : "/assets/images/teaser.jpg"  # generic image used when a post/page has none of its own
logo                      : # optional: "/assets/images/logo.png" (e.g. a simple project icon)
masthead_title            : " " # hides the repeated site title in the header (already shown in the hero/description)
breadcrumbs               : true
words_per_minute          : 200
enable_copy_code_button   : true
copyright                 : "Open-Source SMLM Platform"
copyright_url             :
comments:
  provider                : false   # if you want comments later, "giscus" is the simplest option (uses GitHub)
reCaptcha:
  siteKey                 :
  secret                  :
atom_feed:
  path                    :
  hide                    :
search                    : true
search_full_content       : true
search_provider           : lunr
lunr:
  search_within_pages     : true

# SEO
google_site_verification  :
bing_site_verification    :

# Social Sharing (leave blank if the project has no social accounts)
twitter:
  username                :
facebook:
  username                :
  app_id                  :
  publisher                :
og_image                  : "/assets/images/teaser.jpg"
og_image_alt              : "Open-source SMLM super-resolution microscopy platform"
social:
  type                    : "Organization"
  name                    : "Open-Source SMLM Platform"
  links:

# Analytics
analytics:
  provider                : false

# Site Author (sidebar bio widget)
# NOTE: below, in "defaults", author_profile is set to false for the WHOLE site,
# so this box is NOT shown. It's kept here in case you ever want to enable it
# on a specific page.
author:
  name             : "Open-Source SMLM Platform"
  avatar           :
  bio              : "Documentation and build guide for an open-source, low-cost super-resolution (SMLM) platform, built on top of a conventional fluorescence microscope."
  location         : "IIBCE, Montevideo, Uruguay"
  email            : "jgarat@iibce.edu.uy"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-square-envelope"
      url: "mailto:jgarat@iibce.edu.uy"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/your-username/your-repo"

# Site Footer
footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-square-envelope"
      url: "mailto:jgarat@iibce.edu.uy"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/joagarat/opensmlm"
  since: "2026"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - minimal-mistakes-jekyll.gemspec
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed
  quiet_deps: true
  silence_deprecations: ['import']

# Outputting
permalink: /:categories/:title/
timezone: America/Montevideo

# Pagination (not really used without a posts/blog section, but kept as default)
paginate: 5
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  # _pages and _posts: NO author box with photo (explicit request: don't highlight authorship)
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
      read_time: false
      comments: false
      share: false
      related: false
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true